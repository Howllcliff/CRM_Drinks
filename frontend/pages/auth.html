<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Drinks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body>
    <div class="auth-container card">
        <div class="auth-header">
            <span class="auth-kicker">Sistema de Drinks</span>
            <h1 class="auth-heading">Acesse seu receituario</h1>
        </div>

        <div class="tabs-wrap">
            <button id="btn-tab-login" class="tab-btn active" onclick="toggleAuth('login')">Login</button>
            <button id="btn-tab-register" class="tab-btn" onclick="toggleAuth('register')">Cadastro</button>
        </div>
        
        <form id="auth-form">
            <h2 id="auth-title">Entrar</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-save">Confirmar</button>
            <p class="auth-helper">Seus dados ficam protegidos com autenticacao por token.</p>
        </form>
    </div>

    <script src="../assets/js/login.js"></script>
    </script>
</body>
</html>
