<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Drinks</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; }
        .tab-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 10px; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }
    </style>
</head>
<body>
    <div class="auth-container card">
        <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
            <button id="btn-tab-login" class="tab-btn active" onclick="toggleAuth('login')">Login</button>
            <button id="btn-tab-register" class="tab-btn" onclick="toggleAuth('register')">Cadastro</button>
        </div>
        
        <form id="auth-form">
            <h2 id="auth-title">Entrar</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-save" style="width: 100%;">Confirmar</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        let mode = 'login';
        function toggleAuth(m) {
            mode = m;
            document.getElementById('auth-title').innerText = m === 'login' ? 'Entrar' : 'Criar Conta';
            document.getElementById('btn-tab-login').classList.toggle('active', m === 'login');
            document.getElementById('btn-tab-register').classList.toggle('active', m === 'register');
        }

        (function redirectIfAlreadyLoggedIn() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = './drinks.html';
            }
        })();

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/${mode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = './drinks.html';
                } else {
                    alert(data.message || 'Falha na autenticação.');
                }
            } catch (error) {
                alert('Não foi possível conectar ao servidor local. Inicie o backend em http://localhost:3000.');
            }
        };
    </script>
</body>
</html>
